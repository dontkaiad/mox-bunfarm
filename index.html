<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ферма невидимых кроликов</title>
<link rel="icon" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Almendra:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#142e1a;font-family:'VT323',monospace;}
img.pix{image-rendering:pixelated;image-rendering:crisp-edges;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:#ead5b0;}
::-webkit-scrollbar-thumb{background:#8b5e3c;border-radius:4px;}
input[type="range"]{accent-color:#e8a020;}
select,input{font-family:'VT323',monospace;}
@keyframes popIn{from{opacity:0;transform:translateY(-8px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes bookIn{from{opacity:0;transform:scale(.94) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/app.js"></script>
</body>
</html>
