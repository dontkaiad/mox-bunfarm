<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐰 Ферма невидимых кроликов</title>
<link rel="icon" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Almendra:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#1e4d2b;
  background-image:radial-gradient(circle at 20% 10%,rgba(255,255,255,.04),transparent 40%);
  min-height:100vh;font-family:'VT323',monospace;font-size:20px;color:#3a2415;
}
.header{
  background:linear-gradient(#3f5c3a,#2e4429);border-bottom:4px solid #1f2f1c;
  padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.header-left{flex:1;min-width:0}
.title{
  font-family:'Almendra',serif;font-weight:700;font-size:30px;
  color:#f5e6c8;text-shadow:2px 2px #1f2f1c,0 0 12px rgba(232,160,32,.4);line-height:1.1;
}
.subtitle{color:#a8c87a;font-size:17px;margin-top:2px}
.explanation{color:#7aab5a;font-size:14px;margin-top:2px}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tabs{display:flex;gap:0}
.tab{
  background:#2e4429;border:2px solid #1f2f1c;border-bottom:none;
  color:#8db86a;padding:5px 14px;cursor:pointer;font-family:inherit;font-size:18px;
}
.tab.active{background:#f5e6c8;color:#3a2415;border-color:#8b5e3c}
.tab:hover:not(.active){background:#3a5434}
.btn{
  background:#e8a020;border:2px solid #7a5c00;color:#3a2415;
  padding:5px 14px;cursor:pointer;font-family:inherit;font-size:18px;white-space:nowrap;
}
.btn:hover{filter:brightness(1.1)}
.btn-red{background:#c84b0f;border-color:#7a2000;color:#f5e6c8}
.btn-sm{padding:2px 8px;font-size:16px}
.btn-ghost{background:rgba(255,255,255,.08);border:1px solid #6a9a4a;color:#a8c87a}
.main{max-width:920px;margin:0 auto;padding:12px}
.parchment{background:linear-gradient(180deg,#f5e6c8,#ead5b0);border:3px solid #8b5e3c;padding:16px;min-height:400px}
.map-wrap{
  position:relative;width:100%;padding-bottom:72%;
  background:#4a7c38;border:3px solid #2e5020;overflow:hidden;image-rendering:pixelated;
}
.map-inner{position:absolute;inset:0}
.map-bg{
  position:absolute;inset:0;
  background:url('/assets/sv-grass-a.png') repeat,#4a7c38;
  background-size:48px 40px,auto;opacity:.7;
}
.map-path{position:absolute;background:url('/assets/sv-path-stone.png') repeat-x center;background-size:30px 20px}
.map-path-h{height:20px;left:0;right:0;top:49.5%;transform:translateY(-50%)}
.map-path-v{width:20px;top:0;bottom:0;left:49%;transform:translateX(-50%)}
.zone{position:absolute;border:2px solid rgba(255,255,255,.25);cursor:pointer;transition:background .12s;overflow:hidden}
.zone:hover{background:rgba(255,255,255,.12)!important}
.zone-label{position:absolute;top:5px;left:7px;font-size:14px;color:#f5e6c8;text-shadow:1px 1px rgba(0,0,0,.9);pointer-events:none;z-index:1}
.zone-badge{position:absolute;bottom:5px;right:6px;background:rgba(0,0,0,.65);color:#f5e6c8;font-size:13px;padding:1px 5px;z-index:1}
.zone-badge.heat-1{background:rgba(60,160,60,.85)}
.zone-badge.heat-2{background:rgba(200,160,20,.85)}
.zone-badge.heat-3{background:rgba(200,60,20,.85)}
.sprite{position:absolute;image-rendering:pixelated;pointer-events:none;z-index:2;height:auto}
.zone-popup{
  position:absolute;background:linear-gradient(180deg,#f5e6c8,#ead5b0);
  border:3px solid #8b5e3c;padding:12px;z-index:20;width:260px;
  animation:popIn .15s ease-out;box-shadow:4px 4px 0 rgba(0,0,0,.45);max-height:82%;overflow-y:auto;
}
.zpop-title{font-family:'Almendra',serif;font-size:18px;color:#3d1f00;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.zpop-close{cursor:pointer;font-size:20px;color:#5c3319;background:none;border:none;font-family:inherit;line-height:1}
.zpop-close:hover{color:#c84b0f}
.zone-evt{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid #c4a06c;font-size:16px}
.zone-evt-info{flex:1;min-width:0;font-size:15px;color:#3d1f00}
.zone-evt-actions{display:flex;gap:3px;flex-shrink:0}
.evt-form{background:rgba(0,0,0,.05);border:1px solid #c4a06c;padding:8px;margin:6px 0}
.evt-form label{display:block;font-size:15px;color:#5c3319;margin-bottom:2px}
.evt-form select,.evt-form input{width:100%;border:1px solid #8b5e3c;background:#f5e6c8;font-family:inherit;font-size:16px;padding:2px 4px;color:#3a2415;margin-bottom:4px}
.evt-form .row{display:flex;gap:6px}
.evt-form .row>*{flex:1}
.form-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:4px}
.settings-section{margin-bottom:18px}
.settings-section h3{color:#5c3319;font-size:20px;border-bottom:2px solid #8b5e3c;padding-bottom:3px;margin-bottom:8px}
.preset-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.preset-btn{background:#d4b896;border:2px solid #8b5e3c;color:#3d1f00;padding:3px 12px;cursor:pointer;font-family:inherit;font-size:16px}
.preset-btn.active{background:#e8a020;border-color:#7a5c00}
.preset-btn:hover:not(.active){background:#c4a06c}
.slider-row{display:flex;align-items:center;gap:8px;margin:4px 0}
.slider-label{width:140px;font-size:17px;color:#3d1f00;flex-shrink:0}
.slider-val{width:42px;text-align:right;font-size:17px;color:#5c3319;flex-shrink:0}
input[type=range]{flex:1;accent-color:#e8a020;cursor:pointer}
.settings-note{font-size:15px;color:#7a5235;margin-top:4px}
.worklog-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #c4a06c;font-size:18px}
.s-done{color:#3a7a3a}.s-todo{color:#7a7a5a}
.divider{width:100%;height:8px;background:url('/assets/sv-divider-swatch.png') repeat-x center;background-size:auto 8px;margin:10px 0;opacity:.6}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.score-modal{
  background:linear-gradient(180deg,#f5e6c8,#ead5b0);border:3px solid #8b5e3c;
  padding:20px;min-width:300px;max-width:480px;width:100%;
  max-height:85vh;overflow-y:auto;animation:popIn .15s ease-out;box-shadow:6px 6px 0 rgba(0,0,0,.5);
}
.score-title{font-family:'Almendra',serif;font-size:24px;color:#3d1f00;margin-bottom:4px}
.rabbit-num{font-size:64px;line-height:1;color:#3d1f00;display:block}
.rabbit-range-txt{font-size:18px;color:#7a5235;margin-bottom:8px}
.conf-bar-bg{background:#c4a06c;border:2px solid #8b5e3c;height:16px;margin:4px 0}
.conf-bar-fill{height:100%;transition:width .3s}
.ch{background:#4aaa4a}.cm{background:#aaa020}.cl{background:#c84b0f}
.conf-lbl{font-size:17px;color:#5c3319;margin-bottom:8px}
.score-section{margin:10px 0}
.score-section h4{color:#5c3319;font-size:18px;margin-bottom:4px}
.score-row{display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid #c4a06c;font-size:17px}
.score-row-label{flex:1;color:#3d1f00}
.score-row-val{color:#5c3319;font-weight:bold}
.fok{color:#3a7a3a}.fwarn{color:#7a5a00}.fbad{color:#7a2a00}
.diary-modal{
  background:linear-gradient(180deg,#f5e6c8,#ead5b0);border:3px solid #8b5e3c;
  display:flex;max-width:800px;width:100%;max-height:85vh;
  animation:bookIn .18s ease-out;box-shadow:8px 8px 0 rgba(0,0,0,.5);
}
.diary-page{flex:1;padding:16px;overflow-y:auto;min-width:0}
.diary-page+.diary-page{border-left:4px solid #8b5e3c;background:linear-gradient(180deg,#ead5b0,#d9c49e)}
.diary-page-title{
  font-family:'Almendra',serif;font-size:20px;color:#3d1f00;
  border-bottom:2px solid #8b5e3c;padding-bottom:4px;margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;
}
.diary-entry{padding:5px 0;border-bottom:1px solid rgba(139,94,60,.3);font-size:17px}
.diary-entry-time{color:#7a5235;font-size:14px;display:block;margin-bottom:1px}
.diary-ai{font-size:17px;color:#3a2415;line-height:1.5}
.diary-ai p{margin-bottom:8px}
.diary-ai strong{color:#5c3319}
@keyframes popIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes bookIn{from{transform:translateY(18px) scale(.96);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
@media(max-width:600px){
  .diary-modal{flex-direction:column}
  .diary-page+.diary-page{border-left:none;border-top:4px solid #8b5e3c}
  .header{padding:8px 12px}.title{font-size:22px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/app.js"></script>
</body>
</html>
