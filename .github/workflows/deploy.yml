name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/heylark/mox-bunfarm
            git pull
            # Build frontend in Docker so the host needs no Node installation.
            # Run as root inside the container (standard for build containers) so npm
            # can freely write /.npm cache and node_modules. Chown dist back to the
            # host user so the subsequent rsync can read it.
            docker run --rm \
              -v "$(pwd)":/app \
              -w /app \
              node:20-alpine \
              sh -c "npm ci && npm run build && chown -R $(id -u):$(id -g) dist"
            rsync -a --delete dist/ ~/heylark/heylark-infra/caddy/bunfarm/
            docker compose up -d --build --force-recreate
