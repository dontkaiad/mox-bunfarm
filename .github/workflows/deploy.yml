name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/heylark/mox-bunfarm
            git pull
            # Build frontend in Docker so the host needs no Node installation.
            # -u preserves ownership so rsync can read the output as the current user.
            docker run --rm \
              -v "$(pwd)":/app \
              -w /app \
              -u "$(id -u):$(id -g)" \
              node:20-alpine \
              sh -c "npm ci && npm run build"
            rsync -a --delete dist/ ~/heylark/heylark-infra/caddy/bunfarm/
            docker compose up -d --build --force-recreate
